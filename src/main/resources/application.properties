server.port=${PORT:8080}

# Railway automatically provides these if you add a MySQL service to your project
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:quiz_db}?createDatabaseIfNotExist=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.jpa.hibernate.ddl-auto=update

# Dummy SMTP properties to allow JavaMailSender bean initialization
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
