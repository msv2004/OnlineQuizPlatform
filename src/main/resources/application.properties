server.port=${PORT:8080}

# Database Configuration
# This will work for both local MySQL and Cloud (PostgreSQL or MySQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:quiz_db}?createDatabaseIfNotExist=true}
spring.datasource.username=${MYSQLUSER:${SPRING_DATASOURCE_USERNAME:root}}
spring.datasource.password=${MYSQLPASSWORD:${SPRING_DATASOURCE_PASSWORD:}}

spring.jpa.hibernate.ddl-auto=update
# Automatically detect dialect, or override with SPRING_JPA_DATABASE_PLATFORM
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}

# Dummy SMTP properties to allow JavaMailSender bean initialization
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
